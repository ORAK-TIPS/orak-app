<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>ORAK — Ce que les autres ne voient pas.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --or:#FF4D00;--or2:#FF8C66;--bg:#080808;--card:#0F0F0F;
  --bdr:#1C1C1C;--txt:#eee;--mut:#555;--dim:#333;
  --win:#4CAF50;--gold:#FFD700;--purple:#9B59B6;
  --fn:'Space Grotesk',Arial,sans-serif;
  --fd:'Bebas Neue',Impact,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--txt);font-family:var(--fn);max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden}
button{font-family:var(--fn);cursor:pointer;-webkit-appearance:none;touch-action:manipulation;border:none}
input{font-family:var(--fn)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.8)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px #9B59B688}50%{box-shadow:0 0 22px #9B59B6cc}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
#ticker{background:var(--or);color:#fff;padding:10px 20px;font-size:12px;font-weight:700;letter-spacing:.04em;text-align:center;transition:opacity .5s;min-height:40px;display:flex;align-items:center;justify-content:center}
.hdr{padding:20px 20px 0;border-bottom:1px solid #111}
.logo{font-family:var(--fd);font-size:54px;line-height:1;letter-spacing:.1em;background:linear-gradient(135deg,var(--or),var(--or2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.slogan{font-size:10px;color:var(--dim);letter-spacing:.15em;text-transform:uppercase;margin-top:3px}
.live{display:inline-flex;align-items:center;gap:7px;border:1.5px solid var(--or);border-radius:20px;padding:5px 12px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--or);animation:pulse 1.5s infinite}
.live-t{font-size:11px;color:var(--or);font-weight:700}
.stats{display:flex;gap:7px;overflow-x:auto;padding:16px 0;scrollbar-width:none}
.stats::-webkit-scrollbar{display:none}
.sb{text-align:center;padding:11px 16px;background:var(--card);border-radius:12px;flex-shrink:0;border:1px solid var(--bdr)}
.sb.hot{border-color:var(--or)}
.sv{font-family:var(--fd);font-size:22px;letter-spacing:.05em;color:var(--txt)}
.sb.hot .sv{color:var(--or)}
.sl{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
.tabs{display:flex;gap:4px;padding:10px 12px;background:var(--bg);border-bottom:1px solid #111;position:sticky;top:0;z-index:100}
.tab{flex:1;padding:9px 2px;border-radius:10px;font-size:10px;font-weight:700;background:var(--card);color:#555;line-height:1.4;transition:all .2s;touch-action:manipulation;user-select:none;-webkit-user-select:none}
.tab.on{background:var(--or);color:#fff}
.tab:active{opacity:.8;transform:scale(.96)}
.content{padding:16px 16px 70px}
.panel{display:none}.panel.on{display:block;animation:fadeIn .3s ease}
.slbl{font-size:10px;color:var(--or);text-transform:uppercase;letter-spacing:.12em}
.banner{background:linear-gradient(135deg,#180800,var(--card));border:1.5px solid var(--or);border-radius:18px;padding:20px;margin-bottom:14px}
.ban-lbl{font-size:9px;color:var(--or);text-transform:uppercase;letter-spacing:.15em;margin-bottom:6px}
.ban-date{font-size:12px;color:var(--mut)}
.ban-cote{font-family:var(--fd);font-size:50px;line-height:1;background:linear-gradient(135deg,var(--or),var(--or2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ban-meta{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:16px}
.mb{background:#0A0A0A;border-radius:10px;padding:10px;text-align:center}
.mv{font-family:var(--fd);font-size:14px;color:var(--txt)}
.ml{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:16px;margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.card:hover,.card:focus-within{border-color:var(--or)}
.cb{padding:16px}
.cl{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:.12em;margin-bottom:5px}
.cm{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:5px;line-height:1.3}
.cmk{font-size:13px;color:var(--or);font-weight:700}
.cc{font-family:var(--fd);font-size:34px;color:var(--or);line-height:1}
.cp{background:#1A0A00;color:var(--or2);font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;margin-top:4px;display:inline-block}
.vbar{margin-top:13px}
.vrow{display:flex;justify-content:space-between;margin-bottom:5px}
.vl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em}
.ve{font-size:9px;color:var(--or);font-weight:700}
.vtrack{height:3px;background:var(--bdr);border-radius:2px}
.vfill{height:100%;background:linear-gradient(90deg,var(--or),var(--or2));border-radius:2px}
.abtn{margin-top:13px;background:transparent;border:1px solid #252525;border-radius:9px;color:#555;font-size:11px;padding:8px 14px;width:100%;text-align:left;transition:all .2s;touch-action:manipulation}
.abtn:active{background:#111;color:#999}
.abody{padding:0 16px 16px;border-top:1px solid #141414;animation:fadeIn .2s ease}
.srcs{display:flex;gap:6px;flex-wrap:wrap;margin:13px 0 11px}
.stag{background:#1A0A00;color:var(--or2);font-size:10px;padding:3px 9px;border-radius:4px;font-weight:700}
.itag{background:#111;color:#555;font-size:10px;padding:3px 9px;border-radius:4px}
.rsn{display:flex;gap:9px;margin-bottom:8px;font-size:12.5px;color:#888;line-height:1.5}
.rdot{color:var(--or);flex-shrink:0;margin-top:1px}
.hint{padding:13px 15px;background:var(--card);border-radius:11px;font-size:11.5px;color:#444;line-height:1.7;margin-top:10px}
.aff-btn{display:block;background:linear-gradient(135deg,#1a6b1a,#2d9e2d);color:#fff;border:none;border-radius:14px;padding:16px 20px;font-size:14px;font-weight:700;width:100%;text-align:center;margin:14px 0;text-decoration:none;letter-spacing:.03em;touch-action:manipulation}
.aff-btn:active{opacity:.85}
.aff-banner{background:linear-gradient(135deg,#0A1A0A,#0F1F0F);border:1.5px solid #2d9e2d;border-radius:14px;padding:16px;margin:14px 0;text-align:center}
.aff-title{font-size:13px;font-weight:700;color:#4CAF50;margin-bottom:6px}
.aff-sub{font-size:11px;color:#555;line-height:1.6;margin-bottom:12px}
.tip-card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;margin-bottom:10px;overflow:hidden}
.tip-body{padding:14px 16px}
.tip-type{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;margin-bottom:8px;letter-spacing:.06em}
.tip-match{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:4px}
.tip-pred{font-size:13px;font-weight:600}
.tip-prob{font-size:11px;color:var(--mut);margin-top:5px}
.tip-prob span{color:var(--win);font-weight:700}
.tip-abtn{margin-top:11px;background:transparent;border:1px solid #252525;border-radius:8px;color:#555;font-size:11px;padding:7px 13px;width:100%;text-align:left;touch-action:manipulation}
.tip-abtn:active{background:#111}
.tip-abody{padding:0 16px 14px;border-top:1px solid #141414;animation:fadeIn .2s ease}
.tip-why{display:flex;gap:8px;margin-bottom:7px;font-size:12px;color:#888;line-height:1.5}
.tip-warn{margin-top:10px;padding:10px 14px;background:#111;border-radius:8px;font-size:10.5px;color:#555;line-height:1.6;border-left:2px solid var(--gold)}

/* ── Marchés alternatifs (Free Tips) */
.alt-card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.alt-body{padding:14px 16px}
.alt-marche{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:8px;letter-spacing:.06em}
.alt-match{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:3px}
.alt-pred{font-size:14px;font-weight:700;margin-top:2px}
.alt-cote{display:inline-flex;align-items:center;gap:6px;margin-top:7px;font-size:11px;color:#555}
.alt-cote strong{color:var(--txt);font-size:12px}
.alt-abtn{margin-top:10px;background:transparent;border:1px solid #252525;border-radius:8px;color:#555;font-size:11px;padding:7px 13px;width:100%;text-align:left;touch-action:manipulation;font-family:var(--fn)}
.alt-abtn:active{background:#111}
.alt-abody{padding:0 16px 14px;border-top:1px solid #141414;animation:fadeIn .2s ease}
.alt-why{display:flex;gap:8px;margin-bottom:7px;font-size:12px;color:#888;line-height:1.5}
.section-divider{display:flex;align-items:center;gap:10px;margin:20px 0 14px}
.section-divider span{font-size:10px;color:#333;white-space:nowrap;text-transform:uppercase;letter-spacing:.1em}
.section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:#1A1A1A}
.free-badge{background:#0D1A00;border:1px solid #2d9e2d;color:#4CAF50;font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.08em}
.shdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.tbadge{background:#1A0A00;border:1px solid var(--or);color:var(--or);font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px}
.hgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:17px}
.hs{background:var(--card);border-radius:10px;padding:12px;text-align:center;border:1px solid var(--bdr)}
.hsv{font-family:var(--fd);font-size:26px}
.hsl{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.1em;margin-top:1px}
.hrow{display:flex;align-items:center;gap:11px;background:var(--card);border-radius:11px;padding:12px 15px;margin-bottom:7px}
.hico{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.hd{font-size:11px;color:var(--mut);margin-bottom:2px}
.hm{font-size:11px;color:#444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hc{font-family:var(--fd);font-size:21px;color:var(--txt)}
.hp{font-size:10px;font-weight:700}
.pacte{margin-top:13px;padding:13px 15px;background:var(--card);border-radius:10px;font-size:11px;color:var(--dim);line-height:1.7;border-left:3px solid var(--or)}
.klbl{font-size:10px;color:var(--or);text-transform:uppercase;letter-spacing:.12em;margin-bottom:9px}
.kdesc{font-size:12.5px;color:var(--mut);line-height:1.7;margin-bottom:22px}
.kfield{margin-bottom:13px}
.kfield label{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:7px}
.kinput{background:var(--card);border:1px solid #252525;border-radius:11px;color:var(--txt);padding:13px 16px;font-size:16px;width:100%;outline:none;transition:border-color .2s}
.kinput:focus{border-color:var(--or)}
.kres{background:var(--card);border:1.5px solid var(--or);border-radius:16px;padding:22px}
.kreslbl{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px;text-align:center}
.kamt{font-family:var(--fd);font-size:54px;line-height:1;text-align:center}
.kpct{font-size:13px;color:var(--mut);margin-top:4px;text-align:center}
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px}
.kbox{background:#141414;border-radius:11px;padding:13px;text-align:center}
.kbv{font-family:var(--fd);font-size:21px;color:var(--txt)}
.kbl{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.knote{font-size:10px;color:var(--dim);text-align:center;margin-top:13px}
.pdesc{font-size:12.5px;color:#444;margin:6px 0 20px;line-height:1.6}
.pcard{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:18px;margin-bottom:10px}
.pico{font-size:22px;margin-bottom:10px}
.ptitle{font-size:14px;font-weight:700;color:#ddd;margin-bottom:9px}
.pbody{font-size:12.5px;color:#666;line-height:1.65}
.folie-banner{background:linear-gradient(135deg,#0D0020,#110025);border:2px solid var(--purple);border-radius:18px;padding:22px;margin-bottom:16px;animation:glow 3s infinite}
.folie-lbl{font-size:9px;color:var(--purple);text-transform:uppercase;letter-spacing:.18em;margin-bottom:8px}
.folie-title{font-family:var(--fd);font-size:36px;color:#fff;letter-spacing:.08em;margin-bottom:4px}
.folie-sub{font-size:12px;color:#888;margin-bottom:16px;line-height:1.5}
.folie-cote{font-family:var(--fd);font-size:60px;line-height:1;background:linear-gradient(135deg,var(--purple),#E8A0FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.folie-sel{background:#0A0010;border:1px solid #2A0050;border-radius:12px;padding:14px;margin-bottom:8px}
.folie-sel-match{font-size:13px;font-weight:700;color:#ddd;margin-bottom:4px}
.folie-sel-mkt{font-size:12px;color:var(--purple);font-weight:600}
.folie-sel-cote{font-family:var(--fd);font-size:22px;color:#E8A0FF}
.premium-lock{text-align:center;padding:32px 20px;background:linear-gradient(135deg,#0D0020,#111);border:1px dashed #3A0060;border-radius:18px;margin-bottom:14px}
.premium-badge{display:inline-block;background:linear-gradient(135deg,var(--purple),#7D3C98);color:#fff;font-size:11px;font-weight:700;padding:5px 14px;border-radius:20px;margin-bottom:12px;letter-spacing:.06em}
.trial-btn{background:linear-gradient(135deg,var(--purple),#7D3C98);color:#fff;border:none;border-radius:12px;padding:14px 24px;font-size:14px;font-weight:700;width:100%;margin-top:14px;touch-action:manipulation;transition:opacity .2s;font-family:var(--fn)}
.trial-btn:active{opacity:.8}
.folie-warn{padding:12px 14px;background:#0A0010;border-radius:10px;font-size:11px;color:#555;line-height:1.7;margin-top:14px;border-left:3px solid var(--purple)}

/* ═══ MODAL PREMIUM ═══ */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:1000;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.modal-overlay.hidden{display:none}
.modal-box{background:#0C0C0C;border:1px solid #1E1E1E;border-radius:24px 24px 0 0;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;padding:24px 20px 40px;animation:slideUp .35s cubic-bezier(.25,.8,.25,1)}
.modal-drag{width:40px;height:4px;background:#2A2A2A;border-radius:2px;margin:0 auto 20px}
.modal-title{font-family:var(--fd);font-size:32px;letter-spacing:.08em;margin-bottom:4px;background:linear-gradient(135deg,var(--purple),#E8A0FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.modal-sub{font-size:12px;color:#555;margin-bottom:22px;line-height:1.6}

/* Plans */
.plan-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.plan{background:var(--card);border:2px solid #1E1E1E;border-radius:16px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.plan.sel{border-color:var(--purple);background:#0D0020}
.plan-name{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.plan-price{font-family:var(--fd);font-size:32px;color:var(--txt)}
.plan-usd{font-size:10px;color:#444;margin-top:2px}
.plan-badge{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--purple),#7D3C98);color:#fff;font-size:9px;font-weight:700;padding:2px 10px;border-radius:10px;white-space:nowrap}

/* Méthodes de paiement */
.pay-tabs{display:flex;gap:8px;margin-bottom:18px}
.pay-tab{flex:1;padding:10px 4px;border-radius:12px;border:1.5px solid #1E1E1E;background:var(--card);color:#555;font-size:11px;font-weight:700;text-align:center;cursor:pointer;transition:all .2s;line-height:1.4}
.pay-tab.on{border-color:var(--purple);background:#0D0020;color:#E8A0FF}

/* AirTM */
.airtm-block{background:linear-gradient(135deg,#001A10,#001510);border:1.5px solid #00A862;border-radius:16px;padding:18px;margin-bottom:14px}
.airtm-logo{font-size:22px;margin-bottom:8px}
.airtm-title{font-size:14px;font-weight:700;color:#00D97E;margin-bottom:10px}
.airtm-step{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font-size:12px;color:#888;line-height:1.5}
.airtm-num{background:#00A862;color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
.copy-row{display:flex;align-items:center;gap:8px;background:#002210;border:1px solid #00A862;border-radius:10px;padding:12px 14px;margin:10px 0}
.copy-val{font-size:13px;font-weight:700;color:#00D97E;flex:1;word-break:break-all}
.copy-btn{background:#00A862;color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:10px;font-weight:700;cursor:pointer;flex-shrink:0;touch-action:manipulation;font-family:var(--fn)}
.copy-btn:active{opacity:.7}
.amount-highlight{background:#002210;border:1px dashed #00A862;border-radius:10px;padding:12px;text-align:center;margin:10px 0}
.amount-val{font-family:var(--fd);font-size:36px;color:#00D97E}
.amount-lbl{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:.1em;margin-top:2px}

/* Crypto */
.crypto-block{background:linear-gradient(135deg,#0A0A1A,#0D0D22);border:1.5px solid #3A3A80;border-radius:16px;padding:18px;margin-bottom:14px}
.crypto-sel{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.coin-btn{background:#111;border:1.5px solid #222;border-radius:10px;color:#555;font-size:11px;font-weight:700;padding:7px 13px;cursor:pointer;transition:all .2s;font-family:var(--fn)}
.coin-btn.on{border-color:#F7931A;color:#F7931A;background:#1A0F00}
.coin-btn.on.eth{border-color:#627EEA;color:#627EEA;background:#0A0E1A}
.coin-btn.on.usdt{border-color:#26A17B;color:#26A17B;background:#001A12}
.wallet-block{background:#0D0D1A;border:1px solid #2A2A60;border-radius:12px;padding:14px}
.wallet-net{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px}
.wallet-addr{font-size:11px;font-weight:700;color:#AAA;word-break:break-all;margin-bottom:10px;font-family:monospace;line-height:1.5}
.qr-placeholder{background:#111;border:1px solid #1E1E1E;border-radius:10px;height:60px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#333;margin-bottom:10px}
.crypto-warn{font-size:10px;color:#555;line-height:1.6;padding:10px;background:#080808;border-radius:8px;border-left:2px solid #F7931A}

/* Formulaire confirmation */
.confirm-block{margin-top:18px}
.confirm-lbl{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;display:block}
.confirm-input{background:#111;border:1px solid #252525;border-radius:11px;color:var(--txt);padding:12px 16px;font-size:14px;width:100%;outline:none;transition:border-color .2s;margin-bottom:10px}
.confirm-input:focus{border-color:var(--purple)}
.submit-btn{background:linear-gradient(135deg,var(--purple),#7D3C98);color:#fff;border:none;border-radius:14px;padding:16px;font-size:15px;font-weight:700;width:100%;cursor:pointer;touch-action:manipulation;font-family:var(--fn);transition:opacity .2s;margin-top:6px}
.submit-btn:active{opacity:.8}
.submit-btn:disabled{opacity:.4;cursor:not-allowed}

/* Code d'activation */
.code-block{background:linear-gradient(135deg,#0D0020,#111);border:1.5px dashed #3A0060;border-radius:16px;padding:18px;margin-bottom:14px}

function loadPremiumState() {
  try {
    var s = localStorage.getItem('orak_premium');

      if (p.expiry && new Date(p.expiry) > new Date()) {

  } catch(e) {}

}

  try {
    localStorage.setItem('orak_premium', JSON.stringify(data));

}

  loadPremiumState();
  return premiumState.actif && premiumState.expiry && new Date(premiumState.expiry) > new Date();

  loadPremiumState();
  return premiumState.status === 'pending';

function copyText(text, btn) {
  try {
    navigator.clipboard.writeText(text).then(function() {
      var orig = btn.textContent;
      btn.textContent = '✓ Copié';
      setTimeout(function(){ btn.textContent = orig; }, 2000);
    });
  } catch(e) {
    // Fallback
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    var orig = btn.textContent;
    btn.textContent = '✓ Copié';
    setTimeout(function(){ btn.textContent = orig; }, 2000);
  }
}

function validateCode() {
  var inp = document.getElementById('codeInput');
  if (!inp) return;
  var code = inp.value.trim().toUpperCase();
  var err = document.getElementById('codeErr');
  var ok = document.getElementById('codeOk');

  // Chercher code valide
  var found = null;
  PREMIUM_CONFIG.codes_valides.forEach(function(c) {
    if (c.code.toUpperCase() === code) found = c;
  });

  if (!found) {
    if (err) { err.style.display = 'block'; }
    if (ok) { ok.style.display = 'none'; }
    if (inp) { inp.style.borderColor = '#E74C3C'; }
    return;
  }

  // Code valide !
  if (ok) { ok.style.display = 'block'; }
  if (err) { err.style.display = 'none'; }
  if (inp) { inp.style.borderColor = 'var(--win)'; }

  // Invalider le code (retirer de la liste en mémoire)
  PREMIUM_CONFIG.codes_valides = PREMIUM_CONFIG.codes_valides.filter(function(c) {
    return c.code.toUpperCase() !== code;
  });

  setTimeout(function() {
    activatePremium(found.plan, 'code');
    renderModalActive();
    buildCoupon();
    buildFolie();
  }, 1200);
}

function updateKelly(){
  var bank=parseFloat(document.getElementById('kb').value)||0;
  var prob=parseFloat(document.getElementById('kp').value)||0;
  var cote=parseFloat(document.getElementById('kc').value)||1.01;
  var p=prob/100,b=cote-1,k=(b*p-(1-p))/b;
  var kpct=Math.max(0,k*100).toFixed(1);
  var kcash=((kpct/100)*bank).toFixed(2);
  var gain=(kcash*(cote-1)).toFixed(2);
  var pos=parseFloat(kpct)>0,danger=parseFloat(kpct)>5;
  document.getElementById('kamt').textContent='$'+kcash;
  document.getElementById('kamt').style.color=pos?'#FF4D00':'#333';
  document.getElementById('kpct').textContent='= '+kpct+'% de ta bankroll';
  document.getElementById('kgain').textContent='+$'+gain;
  var vd=document.getElementById('kverdict');
  vd.textContent=danger?'REDUIRE':pos?'VALEUR+':'EVITER';
  vd.style.color=danger?'#FF4D00':pos?'#4CAF50':'#666';
}

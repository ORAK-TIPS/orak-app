function buildKelly(){
  document.getElementById('p3').innerHTML='<div class="klbl">CRITERE DE KELLY — MISE OPTIMALE</div><p class="kdesc">Kelly calcule combien miser pour maximiser tes gains sur le long terme sans detruire ta bankroll.</p><div class="kfield"><label>Bankroll totale ($)</label><input class="kinput" type="number" id="kb" value="200" oninput="updateKelly()"></div><div class="kfield"><label>Probabilite reelle estimee (%)</label><input class="kinput" type="number" id="kp" value="72" min="1" max="99" oninput="updateKelly()"></div><div class="kfield"><label>Cote du bookmaker</label><input class="kinput" type="number" id="kc" value="2.85" step="0.01" oninput="updateKelly()"></div><div class="kres"><div class="kreslbl">Mise recommandee par l\'ORAK</div><div class="kamt" id="kamt">$0</div><div class="kpct" id="kpct">= 0% de ta bankroll</div><div class="kgrid"><div class="kbox"><div class="kbv" id="kgain">+$0</div><div class="kbl">Gain net potentiel</div></div><div class="kbox"><div class="kbv" id="kverdict" style="font-size:12px">—</div><div class="kbl">Verdict Kelly</div></div></div><div class="knote">Regle absolue : ne jamais depasser 5% de ta bankroll sur un seul coupon.</div></div>';
  updateKelly();
}
function updateKelly(){
  var bank=parseFloat(document.getElementById('kb').value)||0;
  var prob=parseFloat(document.getElementById('kp').value)||0;
  var cote=parseFloat(document.getElementById('kc').value)||1.01;
  var p=prob/100,b=cote-1,k=(b*p-(1-p))/b;
  var kpct=Math.max(0,k*100).toFixed(1);
  var kcash=((kpct/100)*bank).toFixed(2);
  var gain=(kcash*(cote-1)).toFixed(2);
  var pos=parseFloat(kpct)>0,danger=parseFloat(kpct)>5;
  document.getElementById('kamt').textContent='$'+kcash;
  document.getElementById('kamt').style.color=pos?'#FF4D00':'#333';
  document.getElementById('kpct').textContent='= '+kpct+'% de ta bankroll';
  document.getElementById('kgain').textContent='+$'+gain;
  var vd=document.getElementById('kverdict');
  vd.textContent=danger?'REDUIRE':pos?'VALEUR+':'EVITER';
  vd.style.color=danger?'#FF4D00':pos?'#4CAF50':'#666';
}
